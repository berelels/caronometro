<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#7c3aed">
    <meta name="description" content="Controle mensal de caronas — marque quem deu carona em cada dia do mês.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Caronômetro">
    <link rel="apple-touch-icon" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    <title>Caronômetro!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="header-titles">
                <h1>Caronômetro!</h1>
                <div class="subtitle">Controle de Caronas</div>
            </div>
            <!-- Botão de Configurações -->
            <button class="settings-btn" id="openSettings" title="Gerenciar Pessoas">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
            </button>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Month Selector -->
            <div class="month-selector">
                <button class="month-btn" id="prevMonth">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <div class="month-name" id="currentMonth"></div>
                <button class="month-btn" id="nextMonth">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>

            <!-- Calendar Grid -->
            <div class="calendar-grid" id="calendar"></div>
        </div>

        <!-- Footer with Stats -->
        <div class="footer">
            <div class="stats-container" id="statsContainer">
                <!-- Estatísticas geradas via JS -->
            </div>
            <button class="btn-primary btn-danger" id="clearMonth">🗑️ Limpar Mês</button>
        </div>

        <!-- Credits -->
        <div class="credits">
            Desenvolvido por <a href="https://github.com/berelels" target="_blank">@berelels</a>
        </div>
    </div>

    <!-- Modal for Student Selection -->
    <div class="modal-overlay" id="rideModal">
        <div class="modal-content">
            <div class="modal-handle"></div>
            <div class="modal-title">Quem deu carona?</div>
            <div id="studentOptionsContainer">
                <!-- Opções geradas via JS -->
            </div>
            <div class="student-option clear" id="clearDayOption">
                <span>❌ Limpar este dia</span>
            </div>
        </div>
    </div>

    <!-- Modal for Settings (Manage Students) -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <div class="modal-handle"></div>
            <div class="modal-title">Gerenciar Pessoas</div>

            <div class="manage-list" id="manageList">
                <!-- Lista gerada via JS -->
            </div>

            <div class="add-form">
                <input type="text" id="newStudentName" class="add-input" placeholder="Nome da pessoa..."
                    autocomplete="off">
                <input type="color" id="newStudentColor" class="color-input" value="#84cc16">
                <button id="addStudentBtn" class="add-btn">Add</button>
            </div>

            <button class="btn-primary" id="closeSettingsModal">Concluído</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>

</html>
